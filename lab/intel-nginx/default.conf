server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /hostsearch/ {
        default_type text/plain;
        return 200 'console.corp-demo.test,172.29.0.10
status.corp-demo.test,172.29.0.10
secure.corp-demo.test,172.29.0.10
manager.corp-demo.test,172.29.0.10
legacy.corp-demo.test,172.29.0.250
';
    }

    location = /search {
        default_type text/html;
        return 200 '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>Corp Demo Search</title></head><body><h1>Corp Demo Search</h1><ul><li><a href="https://console.corp-demo.test/login">Corporate Console</a></li><li><a href="https://status.corp-demo.test/health">Status Board</a></li><li><a href="https://dev.corp-demo.test/">Developer Portal</a></li><li><a href="https://jenkins.corp-demo.test/">Jenkins CI</a></li><li><a href="https://manager.corp-demo.test/manager/html">Application Manager</a></li></ul></body></html>';
    }

    location = /ground-truth {
        alias /usr/share/nginx/html/ground-truth/ground_truth.json;
        default_type application/json;
    }

    location / {
        default_type text/plain;
        return 200 'corp demo intel service';
    }
}
