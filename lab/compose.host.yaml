name: asset-discovery-lab-host

services:
  dns:
    image: coredns/coredns:1.11.1
    container_name: asset-lab-host-dns
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "1053:53/tcp"
      - "1053:53/udp"
    volumes:
      - ./dns/Corefile.host:/etc/coredns/Corefile:ro
      - ./dns/zones:/zones:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.53

  intel:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-intel
    volumes:
      - ./intel-nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/ground_truth:/usr/share/nginx/html/ground-truth:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.40

  www:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-www
    volumes:
      - ./sites/www:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.101

  admin:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-admin
    volumes:
      - ./sites/admin:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.102

  api:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-api
    volumes:
      - ./sites/api/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./sites/api/static:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.103

  dev:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-dev
    volumes:
      - ./sites/dev:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.104

  docs:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-docs
    volumes:
      - ./sites/docs:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.105

  jenkins:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-jenkins
    volumes:
      - ./sites/jenkins:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.106

  manager:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-manager
    volumes:
      - ./sites/manager:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.109

  console:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-console
    volumes:
      - ./sites/console:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.107

  sso:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-sso
    volumes:
      - ./sites/sso:/usr/share/nginx/html:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.108

  edge:
    image: nginx:1.27-alpine
    container_name: asset-lab-host-edge
    depends_on:
      dns:
        condition: service_started
      intel:
        condition: service_started
      www:
        condition: service_started
      admin:
        condition: service_started
      api:
        condition: service_started
      dev:
        condition: service_started
      docs:
        condition: service_started
      jenkins:
        condition: service_started
      manager:
        condition: service_started
      console:
        condition: service_started
      sso:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "8088:80"
      - "8448:443"
    volumes:
      - ./runtime-certs:/etc/nginx/certs:ro
      - ./edge/nginx.host.conf:/etc/nginx/nginx.conf:ro
    networks:
      lab_host_net:
        ipv4_address: 172.29.0.10

networks:
  lab_host_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
