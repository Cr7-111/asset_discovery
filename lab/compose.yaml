name: asset-discovery-lab

services:
  db:
    image: mysql:8.4
    container_name: asset-lab-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: asset_discovery
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ppassword || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      lab_net:
        ipv4_address: 172.28.0.20

  cert-init:
    build:
      context: .
      dockerfile: cert-init/Dockerfile
    container_name: asset-lab-cert-init
    restart: "no"
    volumes:
      - certs:/certs
      - ./cert-init/openssl.cnf:/templates/openssl.cnf:ro
      - ./cert-init/generate-certs.sh:/generate-certs.sh:ro
    command: ["/bin/sh", "/generate-certs.sh"]
    networks:
      lab_net:
        ipv4_address: 172.28.0.30

  dns:
    image: coredns/coredns:1.11.1
    container_name: asset-lab-dns
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - "1053:53/tcp"
      - "1053:53/udp"
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro
      - ./dns/zones:/zones:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      lab_net:
        ipv4_address: 172.28.0.53

  intel:
    build:
      context: .
      dockerfile: intel-api/Dockerfile
    container_name: asset-lab-intel
    volumes:
      - ./data/ground_truth:/app/ground_truth:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.40

  www:
    image: nginx:1.27-alpine
    container_name: asset-lab-www
    volumes:
      - ./sites/www:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.101

  admin:
    image: nginx:1.27-alpine
    container_name: asset-lab-admin
    volumes:
      - ./sites/admin:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.102

  api:
    image: nginx:1.27-alpine
    container_name: asset-lab-api
    volumes:
      - ./sites/api/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./sites/api/static:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.103

  dev:
    image: nginx:1.27-alpine
    container_name: asset-lab-dev
    volumes:
      - ./sites/dev:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.104

  docs:
    image: nginx:1.27-alpine
    container_name: asset-lab-docs
    volumes:
      - ./sites/docs:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.105

  jenkins:
    image: nginx:1.27-alpine
    container_name: asset-lab-jenkins
    volumes:
      - ./sites/jenkins:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.106

  manager:
    image: nginx:1.27-alpine
    container_name: asset-lab-manager
    volumes:
      - ./sites/manager:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.109

  console:
    image: nginx:1.27-alpine
    container_name: asset-lab-console
    volumes:
      - ./sites/console:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.107

  sso:
    image: nginx:1.27-alpine
    container_name: asset-lab-sso
    volumes:
      - ./sites/sso:/usr/share/nginx/html:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.108

  edge:
    image: nginx:1.27-alpine
    container_name: asset-lab-edge
    depends_on:
      cert-init:
        condition: service_completed_successfully
      intel:
        condition: service_started
      www:
        condition: service_started
      admin:
        condition: service_started
      api:
        condition: service_started
      dev:
        condition: service_started
      docs:
        condition: service_started
      jenkins:
        condition: service_started
      manager:
        condition: service_started
      console:
        condition: service_started
      sso:
        condition: service_started
    ports:
      - "8088:80"
      - "8448:443"
    volumes:
      - certs:/etc/nginx/certs:ro
      - ./edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./edge/start.sh:/etc/nginx/start.sh:ro
    command: ["/bin/sh", "/etc/nginx/start.sh"]
    networks:
      lab_net:
        ipv4_address: 172.28.0.10

  backend:
    build:
      context: ..
      dockerfile: lab/app/backend.Dockerfile
    container_name: asset-lab-backend
    depends_on:
      db:
        condition: service_healthy
      dns:
        condition: service_started
      edge:
        condition: service_started
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: asset_discovery
      AUTH_USERNAME: admin
      AUTH_PASSWORD: Admin@123456
      PYTHONUNBUFFERED: "1"
    dns:
      - 172.28.0.53
    ports:
      - "5000:5000"
    volumes:
      - ./data:/opt/lab-data:ro
    networks:
      lab_net:
        ipv4_address: 172.28.0.60

  frontend:
    build:
      context: ..
      dockerfile: lab/app/frontend.Dockerfile
    container_name: asset-lab-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_PROXY_TARGET: http://backend:5000
    ports:
      - "3000:3000"
    networks:
      lab_net:
        ipv4_address: 172.28.0.61

networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  mysql_data:
  certs:
