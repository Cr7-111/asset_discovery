server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        default_type application/json;
        return 200 '{"service":"corp-demo-api","version":"2026.04","paths":["/api/users","/swagger","/graphql"]}';
    }

    location = /swagger {
        default_type text/html;
        return 200 '<html><head><title>Corp Demo Swagger UI</title></head><body><h1>Swagger UI</h1></body></html>';
    }

    location = /graphql {
        default_type application/json;
        return 200 '{"data":{"health":"ok"}}';
    }

    location = /api/users {
        default_type application/json;
        return 200 '{"users":[{"id":1,"name":"alice"},{"id":2,"name":"bob"}]}';
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

